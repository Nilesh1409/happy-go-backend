<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Payment Confirmed ��� Happy Go Bike Rentals</title>

    <style>
      /* -------- Base -------- */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, sans-serif;
        background: #f5f7fa;
        color: #333;
        line-height: 1.6;
      }
      .email-container {
        max-width: 600px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #e5e7eb;
      }

      /* -------- Header -------- */
      .header {
        background: #28a745;
        color: #fff;
        text-align: center;
        padding: 32px 24px;
      }
      .icon {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        color: #28a745;
        font-size: 36px;
      }
      .header h1 {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      /* -------- Content -------- */
      .content {
        padding: 32px 24px;
      }
      .greeting {
        font-size: 18px;
        font-weight: 500;
        margin-bottom: 24px;
      }

      .payment-card {
        background: #28a745;
        color: #fff;
        border-radius: 12px;
        text-align: center;
        padding: 28px 20px;
      }
      .amount {
        font-size: 40px;
        font-weight: 700;
        margin-bottom: 8px;
      }
      .status {
        background: rgba(255, 255, 255, 0.25);
        padding: 6px 18px;
        border-radius: 18px;
        font-weight: 600;
        font-size: 14px;
      }
      .txid {
        margin-top: 14px;
        font-size: 14px;
        opacity: 0.9;
      }

      /* -------- CTA -------- */
      .cta {
        margin: 32px 0;
        text-align: center;
      }
      .btn {
        background: #f47b20;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        padding: 14px 28px;
        border-radius: 6px;
        display: inline-block;
      }

      /* -------- Footer -------- */
      .footer {
        text-align: center;
        font-size: 12px;
        color: #6b7280;
        padding: 24px;
      }
      .brand {
        font-weight: 700;
        color: #f47b20;
        font-size: 14px;
      }
      .header-icon {
        width: 64px;
        height: 64px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: auto;
        margin-bottom: 16px;
      }
    </style>
  </head>

  <body>
    <div class="email-container">
      <!-- Header -->
      <div class="header">
        <div class="header-icon">
          <img
            src="{{websiteUrl}}/assets/happygo.jpeg"
            alt="HappyGo Logo"
            style="
              width: 48px;
              height: 48px;
              border-radius: 50%;
              object-fit: cover;
            "
          />
        </div>
        <h1>Payment Confirmed</h1>
        <p style="opacity: 0.9">Thank you for your payment!</p>
      </div>

      <!-- Content -->
      <div class="content">
        <div class="greeting">Hi {{customerName}},</div>

        <!-- Payment Card -->
        <div class="payment-card">
          <div class="amount">₹{{totalAmount}}</div>
          <div class="status">Payment&nbsp;Successful</div>
          <div class="txid">Transaction&nbsp;ID:&nbsp;{{paymentId}}</div>
        </div>

        <!-- CTA -->
        <div class="cta">
          <a href="{{bookingUrl}}" class="btn">View Booking</a>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <div class="brand">Happy Go Bike Rentals</div>
        <p>Chikkamagaluru, Karnataka 577101</p>
        <p>This is an automated email – please do not reply.</p>
      </div>
    </div>
  </body>
</html>
